name: docusnap-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: docusnap-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${version}" ]]; then
            echo "Release version is empty" >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^v ]]; then
            echo "Release version must start with v" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "commit=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        run: make dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: docusnap-release-bundle
          path: release
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
            release-artifacts/**/docusnap.rb
            release-artifacts/**/install.sh
            release-artifacts/**/SHA256SUMS.txt
