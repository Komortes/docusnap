name: docusnap-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: docusnap-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${version}" ]]; then
            echo "Release version is empty" >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^v ]]; then
            echo "Release version must start with v" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "commit=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          if [[ "${GOOS}" == "windows" ]]; then
            ext=".exe"
          fi
          output="dist/docusnap-${VERSION}-${GOOS}-${GOARCH}${ext}"
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}" -o "${output}" ./cmd/docusnap

      - name: Package artifact
        id: package
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          mkdir -p release
          base="docusnap-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            artifact="${base}.zip"
            cd dist
            zip "../release/${artifact}" "docusnap-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            artifact="${base}.tar.gz"
            cd dist
            tar -czf "../release/${artifact}" "docusnap-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: release/${{ steps.package.outputs.artifact }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        shell: bash
        run: |
          find release-artifacts -type f -print0 | sort -z | xargs -0 shasum -a 256 > release-artifacts/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
            release-artifacts/SHA256SUMS.txt
