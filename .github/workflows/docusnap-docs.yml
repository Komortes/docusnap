name: docusnap-docs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: true
        default: check
        type: choice
        options:
          - check
          - update

concurrency:
  group: docusnap-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-check:
    name: Verify Generated Snapshot And Docs
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'check')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Generate snapshot and docs
        run: go run ./cmd/docusnap run --path . --snapshot snapshot.json --docs docs

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs-check
          path: |
            snapshot.json
            docs
          if-no-files-found: error

      - name: Check generated files are up to date
        run: |
          if ! git diff --quiet -- snapshot.json docs; then
            echo "Generated artifacts are out of date."
            echo ""
            echo "Run locally:"
            echo "  go run ./cmd/docusnap run --path ."
            echo ""
            git --no-pager diff -- snapshot.json docs
            exit 1
          fi

  docs-update:
    name: Refresh Generated Snapshot And Docs
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'update')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate snapshot and docs
        run: go run ./cmd/docusnap run --path . --snapshot snapshot.json --docs docs

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs-update
          path: |
            snapshot.json
            docs
          if-no-files-found: error

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- snapshot.json docs; then
            echo "No generated changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshot.json docs
          git commit -m "chore(docs): update generated snapshot and docs"
          git push
